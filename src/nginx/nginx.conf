server {
    listen 80;
    server_name 145.241.174.38;

    # Tout le trafic HTTP est redirigé vers HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 145.241.174.38;

    ssl_certificate     /etc/nginx/certs/flowsign.crt;
    ssl_certificate_key /etc/nginx/certs/flowsign.key;

    # On désactive les vieilles versions de TLS non sécurisées
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Redirection des appels API vers le conteneur Flask
    location /api {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}